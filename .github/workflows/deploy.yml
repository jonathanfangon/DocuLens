# Deploy Pipeline
# Runs when code is pushed to master (after CI passes).
# Deploys the CDK infrastructure stack to AWS.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — IAM user access key with CDK deploy permissions
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#   AWS_REGION              — e.g. us-west-1
#   ANTHROPIC_API_KEY       — Anthropic API key for the processDocument Lambda

name: Deploy

on:
  push:
    branches: [master]

# Prevent concurrent deployments — if a new push comes in while
# deploying, the in-progress deploy finishes and the new one starts.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # CI must pass before deploying
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to AWS
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: CDK Deploy
        working-directory: infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cdk deploy --require-approval never
